[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --ignore-glob=tests/verilog/picorv32/*
    --ignore-glob=tests/verilog/VexRiscv/*
    --ignore-glob=tests/verilog/opentitan/*
    --ignore-glob=tests/verilog/basejump_stl/*
    --ignore-glob=tests/verilog/verilog-axi/*
    --ignore-glob=tests/verilog/verilog-ethernet/*
    --ignore-glob=tests/verilog/verilog-uart/*

markers =
    unit: Unit tests
    integration: Integration tests
    parser: Parser tests
    port_groups: Port grouping tests
    vhdl: VHDL-specific tests
    verilog: Verilog-specific tests
    systemverilog: SystemVerilog-specific tests
    real_world: Real-world project tests
    performance: Performance tests
    slow: Slow running tests
    
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning 